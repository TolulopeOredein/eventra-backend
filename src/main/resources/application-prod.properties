# ====================================
# Server Configuration
# ====================================
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-message=always

# ====================================
# Logging Configuration
# ====================================
logging.level.org.springframework=INFO
logging.level.com.eventra=DEBUG
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ====================================
# Database Configuration (Supabase)
# ====================================
spring.datasource.url=jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.lhqliiutgokossuzdzkn
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ====================================
# JPA Configuration
# ====================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ====================================
# Redis Configuration (Disabled)
# ====================================
spring.data.redis.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# ====================================
# JWT Configuration
# ====================================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry=900000
app.jwt.refresh-token-expiry=604800000

# ====================================
# External APIs (Optional)
# ====================================
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp-number=${TWILIO_WHATSAPP_NUMBER:}
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:noreply@eventra.com}
resend.from-name=Eventra

# ====================================
# Actuator
# ====================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always