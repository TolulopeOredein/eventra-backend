# Supabase PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://db.lhqliiutgokossuzdzkn.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Critical for Render - must bind to all interfaces and use PORT env
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-message=always

# Disable Redis (not configured)
spring.data.redis.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# Logging
logging.level.com.eventra=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework.data.redis=OFF

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry=900000
app.jwt.refresh-token-expiry=604800000

# External APIs - Optional
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp-number=${TWILIO_WHATSAPP_NUMBER:}
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:noreply@eventra.com}
resend.from-name=Eventra