spring:
  application:
    name: eventra
  # Do NOT set profiles.active here - set it via environment variable
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

server:
  port: ${PORT:8080}
  address: 0.0.0.0

logging:
  level:
    root: INFO
    com.eventra: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:tempSecretKeyForRenderAtLeast32Chars}
    access-token-expiry: 900000
    refresh-token-expiry: 604800000

---
# Production profile - activated by SPRING_PROFILES_ACTIVE=prod
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.lhqliiutgokossuzdzkn
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}